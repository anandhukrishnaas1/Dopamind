version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0
  animate_do: ^3.3.3
  lucide_icons: ^0.257.0
  http: ^1.6.0
  flutter_dotenv: ^6.0.0
  permission_handler: ^12.0.1
  usage_stats: ^1.3.1
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.1
  google_sign_in: ^6.2.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
